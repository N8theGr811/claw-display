; =============================================================================
; Claw Display - ESP32-S3 Firmware
; =============================================================================
; Target: Waveshare ESP32-S3-LCD-1.28 (non-touch variant)
; Display: 1.28" round IPS, 240x240, GC9A01 driver
; Connection: USB-CDC serial (built-in, no external UART chip)
;
; CRITICAL NOTES:
; - Platform MUST be pinned to 6.4.0. Later versions cause boot crash loops.
; - Flash mode MUST be DIO, not QIO. Board boots in DIO mode.
; - Do NOT set board_build.psram_type or board_build.arduino.memory_type.
;   These cause boot failures on this board.
; - Do NOT set partition table overrides unless absolutely necessary.
;
; Reference: https://github.com/adamcooks/waveshare-esp32s3-touch-lcd-128-platformio
; =============================================================================

[env:waveshare_esp32s3_lcd_128]
platform = espressif32 @ 6.4.0
framework = arduino
board = esp32-s3-devkitc-1
monitor_speed = 115200
upload_speed = 921600

; DIO flash mode required for this board (not QIO)
board_build.flash_mode = dio

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

; Prevent serial monitor from resetting the board on connect
monitor_rts = 0
monitor_dtr = 0

build_flags =
    ; Board uses CH343 USB-UART chip, not native USB-CDC.
    ; Serial0 (UART0) routes through CH343 to COM port.
    -DARDUINO_USB_CDC_ON_BOOT=0
